services:
  web:
    build: ./app
    container_name: flask_app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
  redis:
    image: redis:latest
    container_name: redis_db
    ports:
      - "6379:6379" 
    volumes:
      - redis_data:/data
volumes:
  redis_data: